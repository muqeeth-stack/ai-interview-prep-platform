<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Interview Prep</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>AI Interview Prep Platform</h1>
    <select id="category">
      <option>DSA</option>
      <option>HR</option>
      <option>SQL</option>
    </select>
    <button onclick="generateQuestion()">Generate Question</button>
    <div id="questionBox"></div>
    <textarea id="answerBox" placeholder="Write your answer..."></textarea>
    <button onclick="saveAnswer()">Save Answer</button>
    <div id="savedAnswers"></div>
  </div>
  <script src="script.js"></script>
</body>
</html>
