<!DOCTYPE html>
<html>
<head>
  <title>Random Number</title>
</head>
<body>

<h1>Random Number Generator</h1>

<button onclick="generate()">Generate</button>

<p id="number"></p>

<script>
function generate() {
  let num = Math.floor(Math.random() * 100);
  document.getElementById("number").innerText = num;
}
</script>

</body>
</html>
